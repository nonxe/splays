<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splays - Premium Music Experience</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="app-container" class="dashboard-grid">
    
    <!-- LEFT PANEL: Main Player Card -->
    <aside class="player-panel glass-panel">
      <div class="player-header">
        <div class="logo">
          <i data-lucide="music-4" class="logo-icon"></i>
          <span class="logo-text">Splays</span>
        </div>
        <button id="btn-theme-toggle" class="btn-icon theme-toggle-btn" title="Toggle Theme">
          <i data-lucide="sun"></i>
        </button>
      </div>

      <div class="player-body">
        <!-- Album Cover -->
        <div class="cover-container">
          <img id="player-cover-art" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=300&h=300&fit=crop" alt="Album Cover" class="cover-img">
          <div class="cover-glow" id="cover-glow"></div>
        </div>

        <!-- Song Meta Info -->
        <div class="song-meta">
          <div class="meta-left">
            <h2 id="player-song-title" class="truncate">Not Playing</h2>
            <p id="player-song-artist" class="truncate">Choose a song</p>
          </div>
          <button id="btn-player-like" class="btn-icon player-like-btn" title="Like Song">
            <i data-lucide="heart"></i>
          </button>
        </div>

        <!-- Progress Bar Controls -->
        <div class="progress-section">
          <input type="range" id="progress-slider" min="0" max="100" value="0" step="0.1" class="spotify-slider">
          <div class="time-labels">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>

        <!-- Playback Controls -->
        <div class="playback-controls">
          <button id="btn-shuffle" class="btn-icon" title="Shuffle"><i data-lucide="shuffle"></i></button>
          <button id="btn-prev" class="btn-icon" title="Previous"><i data-lucide="skip-back"></i></button>
          <button id="btn-play-pause" class="btn-play-pause-large" title="Play/Pause">
            <i data-lucide="play" id="play-icon-main" class="icon-fill"></i>
          </button>
          <button id="btn-next" class="btn-icon" title="Next"><i data-lucide="skip-forward"></i></button>
          <button id="btn-repeat" class="btn-icon" title="Repeat"><i data-lucide="repeat"></i></button>
        </div>

        <!-- Volume Control -->
        <div class="volume-control-section">
          <button id="btn-volume-mute" class="btn-icon" title="Mute/Unmute">
            <i data-lucide="volume-2" id="volume-icon"></i>
          </button>
          <input type="range" id="volume-slider" min="0" max="100" value="70" class="spotify-slider">
        </div>
      </div>
    </aside>

    <!-- RIGHT PANEL: Library, Tabs & Playlists -->
    <main class="library-panel glass-panel">
      <!-- Search & Tab Controls Header -->
      <div class="library-header">
        <div class="search-box">
          <i data-lucide="search" class="search-icon"></i>
          <input type="text" id="search-input" placeholder="Search songs or artists...">
          <button id="search-clear" class="search-clear-btn"><i data-lucide="x"></i></button>
        </div>

        <nav class="library-tabs">
          <button class="tab-btn active" data-target="tab-all">All Songs</button>
          <button class="tab-btn" data-target="tab-liked">Favorites</button>
          <button class="tab-btn" data-target="tab-recent">Recently Played</button>
          <button class="tab-btn" data-target="tab-visualizer">Visualizer</button>
        </nav>
      </div>

      <!-- Tab Content Area -->
      <div class="library-content">
        
        <!-- Tab: All Songs -->
        <div id="tab-all" class="tab-pane active">
          <div class="section-header">
            <h2>All Tracks</h2>
            <span class="count-badge" id="track-count-text">0 Tracks</span>
          </div>
          <div class="table-container">
            <table class="songs-table">
              <thead>
                <tr>
                  <th class="col-num">#</th>
                  <th class="col-title">Title</th>
                  <th class="col-artist">Artist</th>
                  <th class="col-actions">Actions</th>
                </tr>
              </thead>
              <tbody id="tracks-table-body">
                <!-- Rendered via JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Tab: Liked Songs -->
        <div id="tab-liked" class="tab-pane">
          <div class="section-header">
            <h2>Your Favorites</h2>
            <span class="count-badge" id="liked-count-text">0 Tracks</span>
          </div>
          <div class="table-container">
            <table class="songs-table">
              <thead>
                <tr>
                  <th class="col-num">#</th>
                  <th class="col-title">Title</th>
                  <th class="col-artist">Artist</th>
                  <th class="col-actions">Actions</th>
                </tr>
              </thead>
              <tbody id="liked-table-body">
                <!-- Rendered via JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Tab: Recently Played -->
        <div id="tab-recent" class="tab-pane">
          <div class="section-header">
            <h2>Recently Played</h2>
            <span class="count-badge" id="recent-count-text">0 Tracks</span>
          </div>
          <div class="table-container">
            <table class="songs-table">
              <thead>
                <tr>
                  <th class="col-num">#</th>
                  <th class="col-title">Title</th>
                  <th class="col-artist">Artist</th>
                  <th class="col-actions">Actions</th>
                </tr>
              </thead>
              <tbody id="recent-table-body">
                <!-- Rendered via JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Tab: Visualizer -->
        <div id="tab-visualizer" class="tab-pane">
          <div class="visualizer-container">
            <div class="visualizer-header">
              <div class="visualizer-title">
                <i data-lucide="activity" class="visualizer-icon"></i>
                <h3>Studio Audio Visualizer</h3>
              </div>
              <div class="select-wrapper">
                <select id="visualizer-style" class="glass-select">
                  <option value="bars">Neon Frequency Bars</option>
                  <option value="wave">Oscilloscope Waveform</option>
                  <option value="circle">Circular Aura</option>
                  <option value="particles">Retro Particle Field</option>
                </select>
              </div>
            </div>
            <div class="canvas-panel">
              <canvas id="audio-canvas"></canvas>
              <div class="audio-notice" id="audio-notice">
                <i data-lucide="info"></i>
                <span>Audio Visualizer requires play interaction to connect to your audio.</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>

  </div>

  <!-- Main JavaScript -->
  <script src="app.js"></script>
</body>
</html>
